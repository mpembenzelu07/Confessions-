<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Whisper · Anonymous Confessions & Genuine Advice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --accent: #ec489a;
        }
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: all 0.2s;
            padding: 1rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .logo h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo p { font-size: 0.9rem; opacity: 0.8; }
        .theme-toggle, .dashboard-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text);
        }
        .user-menu {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .notification-badge {
            position: relative;
            cursor: pointer;
        }
        .notification-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* cards */
        .card {
            background: var(--card);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05), 0 10px 15px -3px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 1rem;
            background: var(--bg);
            color: var(--text);
            margin-bottom: 1rem;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: var(--primary-dark); }
        .secondary-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .danger-btn { background: var(--danger); }
        .danger-btn:hover { background: #dc2626; }

        /* feed */
        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .search-box {
            display: flex;
            gap: 0.5rem;
            flex: 1;
        }
        .search-box input { margin-bottom: 0; }
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .filter-chip, .trending-chip {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .filter-chip.active, .trending-chip.active {
            background: var(--primary);
            color: white;
        }
        .confession-feed {
            max-height: 500px;
            overflow-y: auto;
        }
        .confession-item {
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            cursor: pointer;
        }
        .confession-item:hover { background: rgba(59,130,246,0.05); padding-left: 0.5rem; }
        .confession-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .confession-stats {
            display: flex;
            gap: 0.8rem;
            font-size: 0.8rem;
            color: #64748b;
        }
        .expiry-badge {
            font-size: 0.7rem;
            background: var(--warning);
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
        }
        .like-btn { cursor: pointer; color: var(--danger); }
        .like-btn.liked { color: var(--danger); opacity: 1; }

        /* modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card);
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2e3a;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .view { display: none; }
        .view.active { display: block; }
        .back-btn {
            display: inline-block;
            margin-bottom: 1rem;
            cursor: pointer;
            color: var(--primary);
        }
        @media (max-width: 768px) {
            .card { padding: 1rem; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-feather-alt"></i> whisper</h1>
            <p>Speak freely · Get genuine advice · Posts vanish in 48h</p>
        </div>
        <div class="user-menu">
            <div class="notification-badge" id="notificationIcon">
                <i class="fas fa-bell"></i>
                <span id="notificationCount" class="notification-count" style="display:none;">0</span>
            </div>
            <button class="dashboard-btn" id="dashboardBtn"><i class="fas fa-user"></i> My Stuff</button>
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
        </div>
    </div>

    <!-- Feed View -->
    <div id="feedView" class="view active">
        <div class="card">
            <h2><i class="fas fa-pen-fancy"></i> Write your confession</h2>
            <textarea id="confessionText" rows="4" placeholder="What's on your mind? I need advice about..."></textarea>
            <select id="category">
                <option value="mental health">🧠 Mental Health</option>
                <option value="relationships">❤️ Relationships</option>
                <option value="career">💼 Career</option>
                <option value="finance">💰 Finance</option>
                <option value="health">🏥 Health</option>
                <option value="other">🌟 Other</option>
            </select>
            <label><input type="checkbox" id="anonymousCheckbox"> Post anonymously</label>
            <label><input type="checkbox" id="publicCheckbox" checked> Make public</label>
            <button id="submitConfession">Submit & get AI advice</button>
        </div>

        <div class="card">
            <div class="feed-header">
                <h2><i class="fas fa-newspaper"></i> Public confessions</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search confessions...">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
            </div>
            <div class="filter-bar" id="categoryFilter">
                <button class="filter-chip active" data-filter="all">All</button>
                <button class="filter-chip" data-filter="mental health">🧠 Mental Health</button>
                <button class="filter-chip" data-filter="relationships">❤️ Relationships</button>
                <button class="filter-chip" data-filter="career">💼 Career</button>
                <button class="filter-chip" data-filter="finance">💰 Finance</button>
                <button class="filter-chip" data-filter="health">🏥 Health</button>
                <button class="filter-chip" data-filter="other">🌟 Other</button>
            </div>
            <div class="filter-bar" id="trendingFilter">
                <button class="trending-chip active" data-trend="latest">Latest</button>
                <button class="trending-chip" data-trend="trending">🔥 Trending (most advice)</button>
                <button class="trending-chip" data-trend="most-liked">❤️ Most liked</button>
            </div>
            <div id="publicFeed" class="confession-feed">Loading...</div>
        </div>

        <div class="card">
            <h2><i class="fas fa-user-md"></i> Experts advice</h2>
            <div class="filter-bar" id="expertSectors">
                <button class="filter-chip active" data-sector="mental health">🧠 Mental Health</button>
                <button class="filter-chip" data-sector="relationships">❤️ Relationships</button>
                <button class="filter-chip" data-sector="career">💼 Career</button>
                <button class="filter-chip" data-sector="finance">💰 Finance</button>
                <button class="filter-chip" data-sector="health">🏥 Health</button>
            </div>
            <div id="expertAdviceArea"></div>
        </div>
    </div>

    <!-- Detail View -->
    <div id="detailView" class="view">
        <div class="back-btn" id="backToFeed"><i class="fas fa-arrow-left"></i> Back</div>
        <div class="card">
            <h2 id="detailTitle">Confession</h2>
            <div id="detailConfession"></div>
            <div style="margin-top: 1rem;" id="detailActions"></div>
        </div>
        <div class="card">
            <h2><i class="fas fa-robot"></i> AI advice</h2>
            <div id="detailAIAdvice"></div>
        </div>
        <div class="card">
            <h2><i class="fas fa-users"></i> Community advice</h2>
            <div id="detailCommunityAdvice"></div>
            <textarea id="detailAdviceText" rows="2" placeholder="Share your advice..."></textarea>
            <button id="postDetailAdvice">Post advice</button>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="view">
        <div class="back-btn" id="backToFeedFromDashboard"><i class="fas fa-arrow-left"></i> Back</div>
        <div class="card">
            <h2><i class="fas fa-user"></i> Your activity</h2>
            <div id="profileInfo"></div>
        </div>
        <div class="card">
            <h2><i class="fas fa-history"></i> Your confessions</h2>
            <div id="myConfessions"></div>
        </div>
        <div class="card">
            <h2><i class="fas fa-comments"></i> Your advice</h2>
            <div id="myAdvice"></div>
        </div>
    </div>

    <!-- Notifications Modal -->
    <div id="notificationsModal" class="modal">
        <div class="modal-content">
            <h3>Notifications</h3>
            <div id="notificationsList"></div>
            <button id="clearNotifications" class="secondary-btn">Clear all</button>
            <button id="closeNotifications">Close</button>
        </div>
    </div>

    <!-- Edit Confession Modal -->
    <div id="editConfessionModal" class="modal">
        <div class="modal-content">
            <h3>Edit confession</h3>
            <textarea id="editConfessionText" rows="4"></textarea>
            <select id="editCategory"></select>
            <div class="modal-buttons" style="display: flex; gap:0.5rem; margin-top:1rem;">
                <button id="saveEditConfession">Save</button>
                <button id="cancelEditConfession" class="secondary-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Reply Modal -->
    <div id="replyModal" class="modal">
        <div class="modal-content">
            <h3>Reply with advice</h3>
            <textarea id="modalAdviceText" rows="4" placeholder="Share your genuine advice..."></textarea>
            <div class="modal-buttons">
                <button id="modalCancel" class="secondary-btn">Cancel</button>
                <button id="modalSubmit">Post Advice</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
<script>
    // ---------- CONSTANTS ----------
    const EXPIRATION_MS = 48 * 60 * 60 * 1000;
    const stores = {
        confessions: localforage.createInstance({ name: "whisper", storeName: "confessions" }),
        advice: localforage.createInstance({ name: "whisper", storeName: "advice" }),
        votes: localforage.createInstance({ name: "whisper", storeName: "votes" }),
        reports: localforage.createInstance({ name: "whisper", storeName: "reports" }),
        likes: localforage.createInstance({ name: "whisper", storeName: "likes" }),
        notifications: localforage.createInstance({ name: "whisper", storeName: "notifications" })
    };

    // Get or create a persistent user ID (no login)
    let userId = localStorage.getItem('whisper_userId');
    if (!userId) {
        userId = 'user_' + Math.random().toString(36).substr(2, 10) + '_' + Date.now();
        localStorage.setItem('whisper_userId', userId);
    }

    let currentConfessionId = null;
    let currentEditConfessionId = null;
    let currentFilter = "all";
    let currentSearch = "";
    let currentTrend = "latest";
    let activeExpertSector = "mental health";

    // Helper: unique ID
    function uid() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }

    // Show toast
    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.style.opacity = "1";
        setTimeout(() => toast.style.opacity = "0", 2500);
    }

    // ---------- User profile (reputation based on votes on their advice) ----------
    async function getUserReputation() {
        let rep = 0;
        await stores.votes.iterate((vote) => {
            if (vote.targetAuthorId === userId && vote.voteType === 'up') rep++;
            else if (vote.targetAuthorId === userId && vote.voteType === 'down') rep--;
        });
        return rep;
    }

    async function updateProfileDisplay() {
        const rep = await getUserReputation();
        document.getElementById("profileInfo").innerHTML = `
            <p><strong>Your ID:</strong> ${userId.substring(0, 12)}...</p>
            <p><strong>Reputation:</strong> ${rep} points (from advice upvotes/downvotes)</p>
        `;
    }

    // ---------- Data operations ----------
    async function saveConfession(confession) {
        await stores.confessions.setItem(confession.id, confession);
        return confession;
    }

    async function getPublicConfessions() {
        const confs = [];
        const now = Date.now();
        await stores.confessions.iterate((conf) => {
            if (conf.isPublic && !conf.deleted && (now - conf.timestamp < EXPIRATION_MS)) confs.push(conf);
        });
        return confs;
    }

    async function getConfessionById(id) {
        const confession = await stores.confessions.getItem(id);
        if (!confession || (Date.now() - confession.timestamp >= EXPIRATION_MS)) return null;
        return confession;
    }

    async function saveAdvice(advice) {
        await stores.advice.setItem(advice.id, advice);
        return advice;
    }

    async function getAdviceByConfession(confessionId) {
        const list = [];
        await stores.advice.iterate((value) => {
            if (value.confessionId === confessionId && !value.deleted && !value.reported) list.push(value);
        });
        return list.sort((a,b) => b.timestamp - a.timestamp);
    }

    async function getAdviceVoteCount(adviceId) {
        let up = 0, down = 0;
        await stores.votes.iterate((vote) => {
            if (vote.adviceId === adviceId) {
                if (vote.voteType === 'up') up++;
                else if (vote.voteType === 'down') down++;
            }
        });
        return { up, down, score: up - down };
    }

    async function setVote(adviceId, voteType) {
        const key = `${adviceId}_${userId}`;
        const existing = await stores.votes.getItem(key);
        if (existing && existing.voteType === voteType) {
            await stores.votes.removeItem(key);
        } else {
            // remove opposite vote if exists
            if (existing) await stores.votes.removeItem(key);
            const advice = await stores.advice.getItem(adviceId);
            await stores.votes.setItem(key, {
                adviceId, userId, voteType, targetAuthorId: advice?.userId, timestamp: Date.now()
            });
        }
        // Update reputation (no need to recalc here, just refresh later)
    }

    async function likeConfession(confessionId) {
        const key = `${confessionId}_${userId}`;
        const existing = await stores.likes.getItem(key);
        if (existing) {
            await stores.likes.removeItem(key);
            return false;
        } else {
            await stores.likes.setItem(key, { confessionId, userId, timestamp: Date.now() });
            return true;
        }
    }

    async function getConfessionLikes(confessionId) {
        let count = 0;
        await stores.likes.iterate((like) => { if (like.confessionId === confessionId) count++; });
        return count;
    }

    async function reportAdvice(adviceId) {
        const key = `${adviceId}_${userId}`;
        const existing = await stores.reports.getItem(key);
        if (existing) return;
        await stores.reports.setItem(key, { adviceId, userId, timestamp: Date.now() });
        const advice = await stores.advice.getItem(adviceId);
        if (advice) {
            advice.reported = true;
            await stores.advice.setItem(adviceId, advice);
        }
    }

    // Add notification (for when someone replies to your confession)
    async function addNotification(recipientUserId, message, relatedId) {
        const notif = {
            id: uid(),
            userId: recipientUserId,
            message,
            relatedId,
            read: false,
            timestamp: Date.now()
        };
        await stores.notifications.setItem(notif.id, notif);
        checkNotifications();
    }

    // ---------- AI advice generator ----------
    function generateAIAdvice(text, category) {
        const lower = text.toLowerCase();
        if (lower.includes("suicidal") || lower.includes("kill myself") || lower.includes("end it")) {
            return "⚠️ If you're having thoughts of harming yourself, please reach out to a crisis helpline (e.g., 988). You matter, and help is available. Please talk to a professional immediately.";
        }
        const templates = {
            "mental health": "It's brave to share your mental health journey. Consider talking to a therapist or using grounding techniques. You are not alone, and seeking support is a sign of strength. 💙",
            "relationships": "Relationships thrive on communication. Try expressing your feelings with 'I' statements. Healthy boundaries are essential – you deserve respect and understanding.",
            "career": "Career uncertainty is common. Reflect on your strengths and what energizes you. Sometimes a small step, like learning a new skill, opens doors. Remember: your worth isn't defined by your job.",
            "finance": "Financial stress can feel heavy. Start with a simple budget, celebrate small wins, and know that many have rebuilt from tough situations. Free financial counseling can help.",
            "health": "Your health is your foundation. Listen to your body, ask questions to doctors, and lean on your support network. Proactive self-care is empowering.",
            "other": "Thank you for sharing. Every confession is a step toward clarity. I'm here to offer a non-judgmental space. What you're feeling matters, and reaching out is courageous. ✨"
        };
        return templates[category] || templates.other;
    }

    // ---------- Expert advice ----------
    const expertDB = {
        "mental health": { name: "Dr. Amara Chen, Clinical Psychologist", advice: "Your emotional well-being is paramount. If you're feeling overwhelmed, try the 5-4-3-2-1 grounding technique. Therapy is a sign of strength — there's no shame in seeking support." },
        "relationships": { name: "Luis M., Certified Relationship Coach", advice: "Healthy relationships require mutual respect and communication. If you're feeling unheard, consider writing a letter to express your needs. Boundaries protect your heart." },
        "career": { name: "Priya K., Career Strategist & Mentor", advice: "Feeling stuck? Audit your skills and passions. Sometimes a lateral move or upskilling reignites purpose. Network genuinely — opportunities often come from unexpected connections." },
        "finance": { name: "Omar F., CFP®", advice: "Financial peace is a marathon. Automate small savings, tackle high‑interest debt first, and avoid comparison. You are more than your net worth." },
        "health": { name: "Dr. Elena Vasquez, MD", advice: "Physical and mental wellness are intertwined. Prioritize sleep, hydration, and regular check‑ups. If something feels off, trust your intuition and see a doctor." }
    };
    function renderExpertAdvice() {
        const expert = expertDB[activeExpertSector];
        document.getElementById("expertAdviceArea").innerHTML = `
            <div class="advice-item">
                <strong>${expert.name}</strong><br>${expert.advice}
                <div class="advice-meta">
                    <span>✅ Verified expert</span>
                    <div><button class="vote-btn expert-upvote"><i class="fas fa-thumbs-up"></i> Helpful</button>
                    <button class="vote-btn expert-downvote"><i class="fas fa-thumbs-down"></i> Not helpful</button></div>
                </div>
            </div>
        `;
        document.querySelector('.expert-upvote')?.addEventListener('click', () => showToast("Thanks for rating this expert!"));
        document.querySelector('.expert-downvote')?.addEventListener('click', () => showToast("Feedback recorded."));
    }

    // ---------- Feed rendering ----------
    async function renderFeed() {
        let confessions = await getPublicConfessions();
        let filtered = confessions;
        if (currentFilter !== "all") filtered = filtered.filter(c => c.category === currentFilter);
        if (currentSearch) filtered = filtered.filter(c => c.text.toLowerCase().includes(currentSearch.toLowerCase()));

        // Trending sorting
        if (currentTrend === "trending") {
            const adviceCounts = {};
            await stores.advice.iterate((adv) => { if (!adv.deleted && !adv.reported) adviceCounts[adv.confessionId] = (adviceCounts[adv.confessionId] || 0) + 1; });
            filtered.sort((a,b) => (adviceCounts[b.id]||0) - (adviceCounts[a.id]||0));
        } else if (currentTrend === "most-liked") {
            const likeCounts = {};
            await stores.likes.iterate((like) => { likeCounts[like.confessionId] = (likeCounts[like.confessionId] || 0) + 1; });
            filtered.sort((a,b) => (likeCounts[b.id]||0) - (likeCounts[a.id]||0));
        } else {
            filtered.sort((a,b) => b.timestamp - a.timestamp);
        }

        if (filtered.length === 0) {
            document.getElementById("publicFeed").innerHTML = "<p>No confessions found.</p>";
            return;
        }

        let html = '';
        for (const conf of filtered) {
            const adviceList = await getAdviceByConfession(conf.id);
            const adviceCount = adviceList.length;
            const likes = await getConfessionLikes(conf.id);
            const userLiked = await stores.likes.getItem(`${conf.id}_${userId}`);
            const remaining = getRemainingTime(conf.timestamp);
            html += `
                <div class="confession-item" data-id="${conf.id}">
                    <div class="confession-header">
                        <div><strong>${conf.anonymous ? 'Anonymous' : 'Someone'}</strong> · ${conf.category}</div>
                        <div class="confession-stats">
                            <span><i class="fas fa-comment"></i> ${adviceCount}</span>
                            <span class="like-btn ${userLiked ? 'liked' : ''}" data-id="${conf.id}"><i class="fas fa-heart"></i> ${likes}</span>
                            <button class="reply-btn" data-id="${conf.id}">💬 Reply</button>
                            <span class="expiry-badge">${remaining}</span>
                        </div>
                    </div>
                    <div>${conf.text.substring(0,200)}${conf.text.length>200?'…':''}</div>
                    <div class="timestamp">${new Date(conf.timestamp).toLocaleString()}</div>
                </div>
            `;
        }
        document.getElementById("publicFeed").innerHTML = html;

        // Attach event listeners
        document.querySelectorAll('.confession-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('reply-btn') || e.target.classList.contains('like-btn')) return;
                showConfessionDetail(el.getAttribute('data-id'));
            });
        });
        document.querySelectorAll('.reply-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); openReplyModal(btn.getAttribute('data-id')); });
        });
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const liked = await likeConfession(id);
                const newCount = await getConfessionLikes(id);
                btn.innerHTML = `<i class="fas fa-heart"></i> ${newCount}`;
                if (liked) btn.classList.add('liked');
                else btn.classList.remove('liked');
            });
        });
    }

    // ---------- Confession detail view ----------
    async function showConfessionDetail(confessionId) {
        const confession = await getConfessionById(confessionId);
        if (!confession) {
            showToast("Confession expired or not found");
            document.getElementById("backToFeed").click();
            return;
        }
        currentConfessionId = confessionId;
        document.getElementById("detailTitle").innerHTML = `Confession · ${confession.anonymous ? 'Anonymous' : 'Someone'}`;
        const remaining = getRemainingTime(confession.timestamp);
        let actions = '';
        if (confession.userId === userId) {
            actions = `<button id="editConfessionBtn" class="secondary-btn">Edit</button>
                       <button id="deleteConfessionBtn" class="danger-btn">Delete</button>`;
        }
        document.getElementById("detailConfession").innerHTML = `
            <div><strong>Category:</strong> ${confession.category}</div>
            <div>${confession.text}</div>
            <div class="timestamp">${new Date(confession.timestamp).toLocaleString()} · <span class="expiry-badge">${remaining}</span></div>
            <div>${actions}</div>
        `;
        if (confession.userId === userId) {
            document.getElementById("editConfessionBtn")?.addEventListener("click", () => openEditConfession(confessionId));
            document.getElementById("deleteConfessionBtn")?.addEventListener("click", async () => {
                if (confirm("Delete this confession? All advice will also be removed.")) {
                    confession.deleted = true;
                    await stores.confessions.setItem(confessionId, confession);
                    // delete all advice for this confession
                    await stores.advice.iterate((adv, key) => {
                        if (adv.confessionId === confessionId) stores.advice.removeItem(key);
                    });
                    showToast("Confession deleted.");
                    document.getElementById("backToFeed").click();
                }
            });
        }

        // AI advice
        const allAdvice = await getAdviceByConfession(confessionId);
        const aiAdvice = allAdvice.find(a => a.type === 'ai');
        document.getElementById("detailAIAdvice").innerHTML = aiAdvice ? `<div class="advice-item">${aiAdvice.content}<div class="advice-meta">🤖 AI advice</div></div>` : "<p>No AI advice yet.</p>";

        // Community advice
        const communityAdvice = allAdvice.filter(a => a.type === 'community');
        if (communityAdvice.length === 0) document.getElementById("detailCommunityAdvice").innerHTML = "<p>No community advice yet.</p>";
        else {
            let advHtml = '';
            for (const adv of communityAdvice) {
                const votes = await getAdviceVoteCount(adv.id);
                const userVote = await stores.votes.getItem(`${adv.id}_${userId}`);
                const upActive = userVote?.voteType === 'up' ? 'active' : '';
                const downActive = userVote?.voteType === 'down' ? 'active' : '';
                const isOwner = adv.userId === userId;
                advHtml += `
                    <div class="advice-item" data-id="${adv.id}">
                        <div><strong>${adv.authorName || 'Anonymous'}</strong> · ${new Date(adv.timestamp).toLocaleString()}</div>
                        <div>${adv.content}</div>
                        <div class="advice-meta">
                            <span><i class="fas fa-heart"></i> ${votes.score} (${votes.up}👍, ${votes.down}👎)</span>
                            <div class="votes">
                                <button class="vote-btn upvote ${upActive}" data-id="${adv.id}"><i class="fas fa-arrow-up"></i> Up</button>
                                <button class="vote-btn downvote ${downActive}" data-id="${adv.id}"><i class="fas fa-arrow-down"></i> Down</button>
                                ${!isOwner ? `<button class="report-btn" data-id="${adv.id}"><i class="fas fa-flag"></i> Report</button>` : ''}
                                ${isOwner ? `<button class="delete-advice-btn" data-id="${adv.id}"><i class="fas fa-trash"></i> Delete</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }
            document.getElementById("detailCommunityAdvice").innerHTML = advHtml;
            attachDetailVoteHandlers();
            attachDetailReportHandlers();
            attachDetailDeleteAdviceHandlers();
        }

        document.getElementById("feedView").classList.remove("active");
        document.getElementById("detailView").classList.add("active");
    }

    function attachDetailVoteHandlers() {
        document.querySelectorAll('#detailCommunityAdvice .upvote').forEach(btn => {
            btn.removeEventListener('click', handleUpvote);
            btn.addEventListener('click', handleUpvote);
        });
        document.querySelectorAll('#detailCommunityAdvice .downvote').forEach(btn => {
            btn.removeEventListener('click', handleDownvote);
            btn.addEventListener('click', handleDownvote);
        });
    }
    async function handleUpvote(e) {
        const adviceId = e.currentTarget.getAttribute('data-id');
        await setVote(adviceId, 'up');
        if (currentConfessionId) await showConfessionDetail(currentConfessionId);
        renderFeed(); // update feed counts
        updateProfileDisplay(); // refresh reputation
    }
    async function handleDownvote(e) {
        const adviceId = e.currentTarget.getAttribute('data-id');
        await setVote(adviceId, 'down');
        if (currentConfessionId) await showConfessionDetail(currentConfessionId);
        renderFeed();
        updateProfileDisplay();
    }
    function attachDetailReportHandlers() {
        document.querySelectorAll('#detailCommunityAdvice .report-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const adviceId = btn.getAttribute('data-id');
                await reportAdvice(adviceId);
                showToast("Advice reported. Thank you.");
                if (currentConfessionId) await showConfessionDetail(currentConfessionId);
                renderFeed();
            });
        });
    }
    function attachDetailDeleteAdviceHandlers() {
        document.querySelectorAll('#detailCommunityAdvice .delete-advice-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const adviceId = btn.getAttribute('data-id');
                const advice = await stores.advice.getItem(adviceId);
                if (advice && advice.userId === userId) {
                    advice.deleted = true;
                    await stores.advice.setItem(adviceId, advice);
                    showToast("Your advice deleted.");
                    if (currentConfessionId) await showConfessionDetail(currentConfessionId);
                    renderFeed();
                }
            });
        });
    }

    // ---------- Submit new confession ----------
    document.getElementById("submitConfession").addEventListener("click", async () => {
        const text = document.getElementById("confessionText").value.trim();
        if (!text) { showToast("Please write your confession."); return; }
        const category = document.getElementById("category").value;
        const anonymous = document.getElementById("anonymousCheckbox").checked;
        const isPublic = document.getElementById("publicCheckbox").checked;
        const confession = {
            id: uid(),
            text,
            category,
            anonymous,
            isPublic,
            timestamp: Date.now(),
            userId: userId,
            deleted: false
        };
        await saveConfession(confession);
        // Generate and save AI advice
        const aiAdviceText = generateAIAdvice(text, category);
        const aiAdvice = {
            id: uid(),
            confessionId: confession.id,
            type: 'ai',
            content: aiAdviceText,
            timestamp: Date.now(),
            userId: null,
            deleted: false,
            reported: false
        };
        await saveAdvice(aiAdvice);
        showToast("Confession posted! AI advice generated.");
        document.getElementById("confessionText").value = "";
        renderFeed();
    });

    // ---------- Post community advice (from detail view) ----------
    document.getElementById("postDetailAdvice").addEventListener("click", async () => {
        const content = document.getElementById("detailAdviceText").value.trim();
        if (!content || !currentConfessionId) return;
        const confession = await getConfessionById(currentConfessionId);
        if (!confession) { showToast("Confession no longer exists"); return; }
        const advice = {
            id: uid(),
            confessionId: currentConfessionId,
            type: 'community',
            content,
            authorName: "Someone", // anonymous
            timestamp: Date.now(),
            userId: userId,
            deleted: false,
            reported: false
        };
        await saveAdvice(advice);
        // Notify the confession owner (if not the same user)
        if (confession.userId !== userId) {
            await addNotification(confession.userId, `Someone replied to your confession: "${content.substring(0,50)}..."`, currentConfessionId);
        }
        showToast("Advice posted!");
        document.getElementById("detailAdviceText").value = "";
        await showConfessionDetail(currentConfessionId);
        renderFeed();
    });

    // ---------- Reply modal (on feed) ----------
    let currentReplyConfessionId = null;
    function openReplyModal(confessionId) {
        currentReplyConfessionId = confessionId;
        document.getElementById("modalAdviceText").value = "";
        document.getElementById("replyModal").classList.add("active");
    }
    document.getElementById("modalSubmit").addEventListener("click", async () => {
        const content = document.getElementById("modalAdviceText").value.trim();
        if (!content || !currentReplyConfessionId) return;
        const confession = await getConfessionById(currentReplyConfessionId);
        if (!confession) { showToast("Confession no longer exists"); return; }
        const advice = {
            id: uid(),
            confessionId: currentReplyConfessionId,
            type: 'community',
            content,
            authorName: "Someone",
            timestamp: Date.now(),
            userId: userId,
            deleted: false,
            reported: false
        };
        await saveAdvice(advice);
        if (confession.userId !== userId) {
            await addNotification(confession.userId, `Someone replied to your confession: "${content.substring(0,50)}..."`, currentReplyConfessionId);
        }
        showToast("Advice posted!");
        document.getElementById("replyModal").classList.remove("active");
        renderFeed();
        if (currentConfessionId === currentReplyConfessionId) await showConfessionDetail(currentConfessionId);
    });
    document.getElementById("modalCancel").addEventListener("click", () => document.getElementById("replyModal").classList.remove("active"));

    // ---------- Edit confession ----------
    function openEditConfession(confessionId) {
        stores.confessions.getItem(confessionId).then(conf => {
            if (!conf || conf.userId !== userId) return;
            currentEditConfessionId = confessionId;
            document.getElementById("editConfessionText").value = conf.text;
            const categorySelect = document.getElementById("editCategory");
            categorySelect.innerHTML = '';
            ['mental health','relationships','career','finance','health','other'].forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                if (c === conf.category) opt.selected = true;
                categorySelect.appendChild(opt);
            });
            document.getElementById("editConfessionModal").classList.add("active");
        });
    }
    document.getElementById("saveEditConfession").addEventListener("click", async () => {
        const newText = document.getElementById("editConfessionText").value.trim();
        const newCategory = document.getElementById("editCategory").value;
        if (!newText) return;
        const confession = await stores.confessions.getItem(currentEditConfessionId);
        if (confession && confession.userId === userId) {
            confession.text = newText;
            confession.category = newCategory;
            await stores.confessions.setItem(currentEditConfessionId, confession);
            showToast("Confession updated.");
            document.getElementById("editConfessionModal").classList.remove("active");
            if (currentConfessionId === currentEditConfessionId) await showConfessionDetail(currentEditConfessionId);
            renderFeed();
        }
    });
    document.getElementById("cancelEditConfession").addEventListener("click", () => document.getElementById("editConfessionModal").classList.remove("active"));

    // ---------- Dashboard (My Stuff) ----------
    async function showDashboard() {
        await updateProfileDisplay();
        await renderMyConfessions();
        await renderMyAdvice();
        document.getElementById("feedView").classList.remove("active");
        document.getElementById("detailView").classList.remove("active");
        document.getElementById("dashboardView").classList.add("active");
    }
    async function renderMyConfessions() {
        const myConfs = [];
        await stores.confessions.iterate((conf) => {
            if (conf.userId === userId && !conf.deleted && (Date.now() - conf.timestamp < EXPIRATION_MS)) {
                myConfs.push(conf);
            }
        });
        myConfs.sort((a,b)=>b.timestamp-a.timestamp);
        if (myConfs.length === 0) {
            document.getElementById("myConfessions").innerHTML = "<p>You haven't posted any confessions.</p>";
            return;
        }
        let html = '';
        for (const conf of myConfs) {
            const remaining = getRemainingTime(conf.timestamp);
            html += `
                <div class="confession-item" style="margin-bottom:1rem;">
                    <div><strong>${conf.anonymous ? 'Anonymous' : 'You'}</strong> · ${conf.category}</div>
                    <div>${conf.text.substring(0,100)}${conf.text.length>100?'…':''}</div>
                    <div class="timestamp">${new Date(conf.timestamp).toLocaleString()} · <span class="expiry-badge">${remaining}</span></div>
                    <div style="margin-top:0.5rem;">
                        <button class="secondary-btn edit-confession" data-id="${conf.id}">Edit</button>
                        <button class="danger-btn delete-confession" data-id="${conf.id}">Delete</button>
                    </div>
                </div>
            `;
        }
        document.getElementById("myConfessions").innerHTML = html;
        document.querySelectorAll('.edit-confession').forEach(btn => {
            btn.addEventListener('click', () => openEditConfession(btn.getAttribute('data-id')));
        });
        document.querySelectorAll('.delete-confession').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm("Delete this confession? All advice will also be removed.")) {
                    const id = btn.getAttribute('data-id');
                    const conf = await stores.confessions.getItem(id);
                    if (conf && conf.userId === userId) {
                        conf.deleted = true;
                        await stores.confessions.setItem(id, conf);
                        await stores.advice.iterate((adv, key) => {
                            if (adv.confessionId === id) stores.advice.removeItem(key);
                        });
                        showToast("Confession deleted.");
                        renderMyConfessions();
                        renderFeed();
                    }
                }
            });
        });
    }
    async function renderMyAdvice() {
        const myAdv = [];
        await stores.advice.iterate((adv) => {
            if (adv.userId === userId && !adv.deleted && adv.type === 'community') myAdv.push(adv);
        });
        myAdv.sort((a,b)=>b.timestamp-a.timestamp);
        if (myAdv.length === 0) {
            document.getElementById("myAdvice").innerHTML = "<p>You haven't posted any advice.</p>";
            return;
        }
        let html = '';
        for (const adv of myAdv) {
            const confession = await stores.confessions.getItem(adv.confessionId);
            const votes = await getAdviceVoteCount(adv.id);
            html += `
                <div class="advice-item" style="margin-bottom:1rem;">
                    <div><strong>To:</strong> ${confession ? (confession.anonymous ? 'Anonymous' : 'Someone') : 'Unknown'}</div>
                    <div>${adv.content.substring(0,100)}${adv.content.length>100?'…':''}</div>
                    <div class="advice-meta">👍 ${votes.score} points · ${new Date(adv.timestamp).toLocaleString()}</div>
                    <button class="danger-btn delete-my-advice" data-id="${adv.id}">Delete</button>
                </div>
            `;
        }
        document.getElementById("myAdvice").innerHTML = html;
        document.querySelectorAll('.delete-my-advice').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                const adv = await stores.advice.getItem(id);
                if (adv && adv.userId === userId) {
                    adv.deleted = true;
                    await stores.advice.setItem(id, adv);
                    showToast("Advice deleted.");
                    renderMyAdvice();
                    if (currentConfessionId === adv.confessionId) await showConfessionDetail(currentConfessionId);
                    renderFeed();
                }
            });
        });
    }

    // ---------- Notifications ----------
    async function checkNotifications() {
        let count = 0;
        await stores.notifications.iterate((n) => { if (n.userId === userId && !n.read) count++; });
        const badge = document.getElementById("notificationCount");
        if (count > 0) { badge.textContent = count; badge.style.display = "flex"; }
        else badge.style.display = "none";
    }
    document.getElementById("notificationIcon").addEventListener("click", async () => {
        const list = [];
        await stores.notifications.iterate((n) => { if (n.userId === userId) list.push(n); });
        list.sort((a,b)=>b.timestamp-a.timestamp);
        const html = list.length ? list.map(n => `<div>${n.message} - ${new Date(n.timestamp).toLocaleString()}</div>`).join('') : "<p>No notifications</p>";
        document.getElementById("notificationsList").innerHTML = html;
        document.getElementById("notificationsModal").classList.add("active");
        // mark as read
        for (const n of list) { n.read = true; await stores.notifications.setItem(n.id, n); }
        checkNotifications();
    });
    document.getElementById("clearNotifications").addEventListener("click", async () => {
        await stores.notifications.clear();
        checkNotifications();
        document.getElementById("notificationsList").innerHTML = "<p>No notifications</p>";
    });
    document.getElementById("closeNotifications").addEventListener("click", () => document.getElementById("notificationsModal").classList.remove("active"));

    // ---------- Back to feed ----------
    document.getElementById("backToFeed").addEventListener("click", () => {
        document.getElementById("detailView").classList.remove("active");
        document.getElementById("feedView").classList.add("active");
        currentConfessionId = null;
        renderFeed();
    });
    document.getElementById("backToFeedFromDashboard").addEventListener("click", () => {
        document.getElementById("dashboardView").classList.remove("active");
        document.getElementById("feedView").classList.add("active");
        renderFeed();
    });
    document.getElementById("dashboardBtn").addEventListener("click", showDashboard);

    // ---------- Filters ----------
    document.querySelectorAll('#categoryFilter .filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('#categoryFilter .filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentFilter = chip.getAttribute('data-filter');
            renderFeed();
        });
    });
    document.querySelectorAll('#trendingFilter .trending-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('#trendingFilter .trending-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentTrend = chip.getAttribute('data-trend');
            renderFeed();
        });
    });
    document.getElementById("searchBtn").addEventListener("click", () => {
        currentSearch = document.getElementById("searchInput").value.trim();
        renderFeed();
    });
    document.getElementById("searchInput").addEventListener("keypress", (e) => { if (e.key === 'Enter') document.getElementById("searchBtn").click(); });
    document.querySelectorAll('#expertSectors .filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('#expertSectors .filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            activeExpertSector = chip.getAttribute('data-sector');
            renderExpertAdvice();
        });
    });

    // ---------- Theme ----------
    const themeToggle = document.getElementById("themeToggle");
    themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        localStorage.setItem('darkMode', document.body.classList.contains('dark'));
        themeToggle.innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
    themeToggle.innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';

    // ---------- Helpers ----------
    function getRemainingTime(timestamp) {
        const elapsed = Date.now() - timestamp;
        const remaining = EXPIRATION_MS - elapsed;
        if (remaining <= 0) return "Expired";
        const hours = Math.floor(remaining / (1000 * 60 * 60));
        const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
        if (hours > 0) return `${hours}h ${minutes}m left`;
        return `${minutes}m left`;
    }

    // ---------- Initial load ----------
    async function init() {
        await renderFeed();
        renderExpertAdvice();
        setInterval(() => { renderFeed(); checkNotifications(); }, 60000);
        checkNotifications();
        updateProfileDisplay();
    }
    init();
</script>
</body>
</html>

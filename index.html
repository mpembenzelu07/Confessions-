<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Whisper · Confession & Advice Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-light: #f9fafc;
            --card-light: #ffffff;
            --text-light: #1e293b;
            --border-light: #e2e8f0;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }
        body.dark {
            --bg-light: #0f172a;
            --card-light: #1e293b;
            --text-light: #f1f5f9;
            --border-light: #334155;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.3s, color 0.2s;
        }
        body {
            background: var(--bg-light);
            color: var(--text-light);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo p {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .theme-toggle {
            background: var(--card-light);
            border: 1px solid var(--border-light);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 500;
        }
        /* cards */
        .card {
            background: var(--card-light);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05), 0 10px 15px -3px rgba(0,0,0,0.1);
            border: 1px solid var(--border-light);
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
        /* forms */
        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-light);
            border-radius: 1rem;
            background: var(--bg-light);
            color: var(--text-light);
            font-family: inherit;
            margin-bottom: 1rem;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: var(--primary-dark);
        }
        .secondary-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-light);
        }
        /* advice items */
        .advice-item {
            background: var(--bg-light);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary);
        }
        .advice-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            color: #64748b;
        }
        .votes {
            display: flex;
            gap: 1rem;
        }
        .vote-btn {
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            color: var(--text-light);
            opacity: 0.7;
        }
        .vote-btn:hover { opacity: 1; }
        .upvote.active { color: var(--success); }
        .downvote.active { color: var(--danger); }
        .sector-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .pill {
            background: var(--bg-light);
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid var(--border-light);
        }
        .pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .confession-feed {
            max-height: 400px;
            overflow-y: auto;
        }
        .confession-item {
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 0;
        }
        .timestamp {
            font-size: 0.7rem;
            opacity: 0.6;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2e3a;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-feather-alt"></i> whisper</h1>
            <p>Share freely · Get genuine advice</p>
        </div>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> Dark mode</button>
    </div>

    <div class="grid-2">
        <!-- Left column: confession form -->
        <div class="card">
            <h2><i class="fas fa-pen-fancy"></i> Write your confession</h2>
            <textarea id="confessionText" rows="5" placeholder="What's on your mind? I feel... I need advice about..."></textarea>
            <select id="category">
                <option value="mental health">🧠 Mental Health</option>
                <option value="relationships">❤️ Relationships</option>
                <option value="career">💼 Career</option>
                <option value="finance">💰 Finance</option>
                <option value="health">🏥 Health</option>
                <option value="other">🌟 Other</option>
            </select>
            <label><input type="checkbox" id="anonymousCheckbox"> Post anonymously</label>
            <label><input type="checkbox" id="publicCheckbox" checked> Make public (visible to community)</label>
            <button id="submitConfession">Submit & get AI advice</button>
            <div style="margin-top: 1rem; font-size:0.8rem;"><i class="fas fa-shield-alt"></i> Your privacy matters. You control what's shared.</div>
        </div>

        <!-- Right column: AI advice + expert advice -->
        <div>
            <div class="card">
                <h2><i class="fas fa-robot"></i> AI advice</h2>
                <div id="aiAdviceArea">✨ Submit a confession to receive instant, empathetic advice.</div>
            </div>
            <div class="card">
                <h2><i class="fas fa-user-md"></i> Experts advice</h2>
                <div class="sector-pills" id="expertSectors">
                    <button class="pill" data-sector="mental health">🧠 Mental Health</button>
                    <button class="pill" data-sector="relationships">❤️ Relationships</button>
                    <button class="pill" data-sector="career">💼 Career</button>
                    <button class="pill" data-sector="finance">💰 Finance</button>
                    <button class="pill" data-sector="health">🏥 Health</button>
                </div>
                <div id="expertAdviceArea"></div>
            </div>
        </div>
    </div>

    <!-- Community section -->
    <div class="card">
        <h2><i class="fas fa-users"></i> Community advice</h2>
        <div id="communityAdviceArea">Loading advice from community...</div>
        <div style="margin-top: 1rem;">
            <textarea id="communityAdviceText" rows="2" placeholder="Share your wisdom... (as a community member)"></textarea>
            <button id="postCommunityAdvice" class="secondary-btn">Post advice</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-newspaper"></i> Recent public confessions</h2>
        <div id="publicFeed" class="confession-feed">Loading...</div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
<script>
    // ---------- Data layer using localForage (IndexedDB) ----------
    const stores = {
        confessions: localforage.createInstance({ name: "whisper", storeName: "confessions" }),
        advice: localforage.createInstance({ name: "whisper", storeName: "advice" }),
        votes: localforage.createInstance({ name: "whisper", storeName: "votes" })
    };

    // Helper: generate unique ID
    function uid() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    // ---------- Data functions ----------
    async function saveConfession(confession) {
        await stores.confessions.setItem(confession.id, confession);
        return confession;
    }

    async function getPublicConfessions() {
        const confs = [];
        await stores.confessions.iterate((value, key) => {
            if (value.isPublic) confs.push(value);
        });
        return confs.sort((a,b) => b.timestamp - a.timestamp);
    }

    async function saveAdvice(advice) {
        await stores.advice.setItem(advice.id, advice);
        return advice;
    }

    async function getAdviceByConfession(confessionId) {
        const list = [];
        await stores.advice.iterate((value) => {
            if (value.confessionId === confessionId) list.push(value);
        });
        return list;
    }

    async function getAllAdvice() {
        const list = [];
        await stores.advice.iterate((value) => list.push(value));
        return list;
    }

    async function getVote(adviceId, userId) {
        const key = `${adviceId}_${userId}`;
        return await stores.votes.getItem(key);
    }

    async function setVote(adviceId, userId, voteType) {
        const key = `${adviceId}_${userId}`;
        await stores.votes.setItem(key, { adviceId, userId, voteType, timestamp: Date.now() });
    }

    async function getAdviceVoteCount(adviceId) {
        let up = 0, down = 0;
        await stores.votes.iterate((vote) => {
            if (vote.adviceId === adviceId) {
                if (vote.voteType === 'up') up++;
                else if (vote.voteType === 'down') down++;
            }
        });
        return { up, down, score: up - down };
    }

    // ---------- AI advice generator (enhanced) ----------
    function generateAIAdvice(text, category) {
        const lower = text.toLowerCase();
        if (lower.includes("suicidal") || lower.includes("kill myself") || lower.includes("end it")) {
            return "⚠️ If you're having thoughts of harming yourself, please reach out immediately to a crisis helpline (e.g., 988 in US). You matter, and help is available. This is a serious matter – please talk to a professional right now.";
        }
        const templates = {
            "mental health": "It's brave to share your mental health journey. Consider talking to a therapist or using grounding techniques. You are not alone, and seeking support is a sign of strength. 💙",
            "relationships": "Relationships thrive on communication. Try expressing your feelings with 'I' statements. Healthy boundaries are essential – you deserve respect and understanding.",
            "career": "Career uncertainty is common. Reflect on your strengths and what energizes you. Sometimes a small step, like learning a new skill, opens doors. Remember: your worth isn't defined by your job.",
            "finance": "Financial stress can feel heavy. Start with a simple budget, celebrate small wins, and know that many have rebuilt from tough situations. Free financial counseling can help.",
            "health": "Your health is your foundation. Listen to your body, ask questions to doctors, and lean on your support network. Proactive self-care is empowering.",
            "other": "Thank you for sharing. Every confession is a step toward clarity. I'm here to offer a non-judgmental space. What you're feeling matters, and reaching out is courageous. ✨"
        };
        return templates[category] || templates.other;
    }

    // ---------- Expert advice database (static) ----------
    const expertDB = {
        "mental health": { name: "Dr. Amara Chen, Clinical Psychologist", advice: "Your emotional well-being is paramount. If you're feeling overwhelmed, try the 5-4-3-2-1 grounding technique. Therapy is a sign of strength — there's no shame in seeking support." },
        "relationships": { name: "Luis M., Certified Relationship Coach", advice: "Healthy relationships require mutual respect and communication. If you're feeling unheard, consider writing a letter to express your needs. Boundaries protect your heart." },
        "career": { name: "Priya K., Career Strategist & Mentor", advice: "Feeling stuck? Audit your skills and passions. Sometimes a lateral move or upskilling reignites purpose. Network genuinely — opportunities often come from unexpected connections." },
        "finance": { name: "Omar F., CFP®", advice: "Financial peace is a marathon. Automate small savings, tackle high‑interest debt first, and avoid comparison. You are more than your net worth." },
        "health": { name: "Dr. Elena Vasquez, MD", advice: "Physical and mental wellness are intertwined. Prioritize sleep, hydration, and regular check‑ups. If something feels off, trust your intuition and see a doctor." }
    };
    let activeExpertSector = "mental health";

    function renderExpertAdvice() {
        const expert = expertDB[activeExpertSector];
        const html = `
            <div class="advice-item">
                <strong>${expert.name}</strong><br>
                ${expert.advice}
                <div class="advice-meta">
                    <span>✅ Verified expert • ${activeExpertSector}</span>
                    <div class="votes">
                        <button class="vote-btn expert-upvote"><i class="fas fa-thumbs-up"></i> Helpful</button>
                        <button class="vote-btn expert-downvote"><i class="fas fa-thumbs-down"></i> Not helpful</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById("expertAdviceArea").innerHTML = html;
        document.querySelector('.expert-upvote')?.addEventListener('click', () => showToast("Thanks for rating this expert!"));
        document.querySelector('.expert-downvote')?.addEventListener('click', () => showToast("Feedback recorded. We'll improve matches."));
    }

    // ---------- Community advice rendering with votes ----------
    async function renderCommunityAdvice() {
        const allAdvice = await getAllAdvice();
        const communityAdvice = allAdvice.filter(a => a.type === 'community');
        if (communityAdvice.length === 0) {
            document.getElementById("communityAdviceArea").innerHTML = "<p>No community advice yet. Be the first to share your wisdom!</p>";
            return;
        }
        // sort by vote score
        const withScores = await Promise.all(communityAdvice.map(async (adv) => {
            const votes = await getAdviceVoteCount(adv.id);
            return { ...adv, score: votes.score };
        }));
        withScores.sort((a,b) => b.score - a.score);

        let html = '';
        for (const adv of withScores) {
            const votes = await getAdviceVoteCount(adv.id);
            html += `
                <div class="advice-item" data-id="${adv.id}">
                    <div><strong>${adv.authorName || 'Anonymous'}</strong> · ${new Date(adv.timestamp).toLocaleString()}</div>
                    <div>${adv.content}</div>
                    <div class="advice-meta">
                        <span><i class="fas fa-heart"></i> ${votes.score} points (${votes.up} up, ${votes.down} down)</span>
                        <div class="votes">
                            <button class="vote-btn upvote" data-id="${adv.id}"><i class="fas fa-arrow-up"></i> Up</button>
                            <button class="vote-btn downvote" data-id="${adv.id}"><i class="fas fa-arrow-down"></i> Down</button>
                        </div>
                    </div>
                </div>
            `;
        }
        document.getElementById("communityAdviceArea").innerHTML = html;
        attachVoteHandlers();
    }

    async function attachVoteHandlers() {
        const upBtns = document.querySelectorAll('.upvote');
        const downBtns = document.querySelectorAll('.downvote');
        for (let btn of upBtns) {
            btn.addEventListener('click', async (e) => {
                const adviceId = btn.getAttribute('data-id');
                const userId = localStorage.getItem('userId') || 'guest_' + Math.random();
                localStorage.setItem('userId', userId);
                const existing = await getVote(adviceId, userId);
                if (existing && existing.voteType === 'up') {
                    await stores.votes.removeItem(`${adviceId}_${userId}`);
                } else {
                    await setVote(adviceId, userId, 'up');
                }
                renderCommunityAdvice();
            });
        }
        for (let btn of downBtns) {
            btn.addEventListener('click', async (e) => {
                const adviceId = btn.getAttribute('data-id');
                const userId = localStorage.getItem('userId') || 'guest_' + Math.random();
                localStorage.setItem('userId', userId);
                const existing = await getVote(adviceId, userId);
                if (existing && existing.voteType === 'down') {
                    await stores.votes.removeItem(`${adviceId}_${userId}`);
                } else {
                    await setVote(adviceId, userId, 'down');
                }
                renderCommunityAdvice();
            });
        }
    }

    // ---------- Public confession feed ----------
    async function renderPublicFeed() {
        const confessions = await getPublicConfessions();
        if (confessions.length === 0) {
            document.getElementById("publicFeed").innerHTML = "<p>No public confessions yet. Share yours to start the conversation.</p>";
            return;
        }
        let html = '';
        for (const conf of confessions) {
            html += `
                <div class="confession-item">
                    <div><strong>${conf.anonymous ? 'Anonymous' : 'Someone'}</strong> · ${conf.category}</div>
                    <div>${conf.text.substring(0, 200)}${conf.text.length > 200 ? '…' : ''}</div>
                    <div class="timestamp">${new Date(conf.timestamp).toLocaleString()}</div>
                </div>
            `;
        }
        document.getElementById("publicFeed").innerHTML = html;
    }

    // ---------- Submit confession ----------
    document.getElementById("submitConfession").addEventListener("click", async () => {
        const text = document.getElementById("confessionText").value.trim();
        if (!text) { showToast("Please write your confession."); return; }
        const category = document.getElementById("category").value;
        const anonymous = document.getElementById("anonymousCheckbox").checked;
        const isPublic = document.getElementById("publicCheckbox").checked;

        const confession = {
            id: uid(),
            text,
            category,
            anonymous,
            isPublic,
            timestamp: Date.now(),
            userId: localStorage.getItem('userId') || 'guest_' + Math.random()
        };
        await saveConfession(confession);
        localStorage.setItem('userId', confession.userId);

        // Generate AI advice and save
        const aiAdviceText = generateAIAdvice(text, category);
        const aiAdvice = {
            id: uid(),
            confessionId: confession.id,
            type: 'ai',
            content: aiAdviceText,
            timestamp: Date.now()
        };
        await saveAdvice(aiAdvice);
        document.getElementById("aiAdviceArea").innerHTML = `<div class="advice-item">${aiAdviceText}<div class="advice-meta">🤖 AI advice · generated just now</div></div>`;

        // Show success and refresh feed
        showToast("Confession submitted! AI advice generated.");
        document.getElementById("confessionText").value = "";
        renderPublicFeed();
        renderCommunityAdvice(); // refresh votes display if needed
    });

    // ---------- Post community advice ----------
    document.getElementById("postCommunityAdvice").addEventListener("click", async () => {
        const content = document.getElementById("communityAdviceText").value.trim();
        if (!content) { showToast("Please write some advice."); return; }
        const userId = localStorage.getItem('userId') || 'guest_' + Math.random();
        localStorage.setItem('userId', userId);
        const advice = {
            id: uid(),
            type: 'community',
            content,
            authorName: "Community Member", // could be user name later
            timestamp: Date.now(),
            userId
        };
        await saveAdvice(advice);
        showToast("Thank you for sharing your advice!");
        document.getElementById("communityAdviceText").value = "";
        renderCommunityAdvice();
    });

    // ---------- Theme toggle ----------
    const themeToggle = document.getElementById("themeToggle");
    themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        const icon = themeToggle.querySelector("i");
        if (document.body.classList.contains("dark")) {
            icon.className = "fas fa-sun";
            themeToggle.innerHTML = '<i class="fas fa-sun"></i> Light mode';
        } else {
            icon.className = "fas fa-moon";
            themeToggle.innerHTML = '<i class="fas fa-moon"></i> Dark mode';
        }
    });

    // ---------- Expert sector switching ----------
    const sectorBtns = document.querySelectorAll("#expertSectors .pill");
    sectorBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            sectorBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            activeExpertSector = btn.getAttribute("data-sector");
            renderExpertAdvice();
        });
    });
    // set default active
    document.querySelector('#expertSectors .pill[data-sector="mental health"]').classList.add("active");
    renderExpertAdvice();

    // ---------- Toast ----------
    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.style.opacity = "1";
        setTimeout(() => { toast.style.opacity = "0"; }, 2500);
    }

    // ---------- Initial load ----------
    async function init() {
        await renderPublicFeed();
        await renderCommunityAdvice();
        document.getElementById("aiAdviceArea").innerHTML = "<div class='advice-item'>✨ Submit a confession to receive instant, empathetic advice.</div>";
    }
    init();
</script>
</body>
</html>
